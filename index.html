<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Boilerplates & Starter Kits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen text-gray-900">

    <header class="bg-gradient-to-br from-blue-700 via-indigo-800 to-purple-900 py-20 px-6 text-center shadow-lg relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 tracking-tight">
                The Best SaaS Boilerplates
            </h1>
            <p class="text-xl text-blue-100 mb-10 max-w-2xl mx-auto">
                Skip the setup. Launch your next startup in days, not weeks.
            </p>
            
            <div class="relative max-w-xl mx-auto">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search frameworks, tools, or names..." 
                    class="w-full px-6 py-4 rounded-full text-lg shadow-2xl focus:outline-none focus:ring-4 focus:ring-blue-400 transition-all text-gray-800 placeholder-gray-400"
                >
            </div>
        </div>
        
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-full h-full bg-gradient-to-b from-white/10 to-transparent opacity-20 pointer-events-none"></div>
    </header>

    <main class="max-w-6xl mx-auto p-6 md:p-10 -mt-8 relative z-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="directory-grid">
            </div>
        
        <div id="no-results" class="hidden text-center py-20">
            <p class="text-2xl text-gray-500 font-semibold">No boilerplates found.</p>
            <p class="text-gray-400 mt-2">Try searching for something else.</p>
        </div>
    </main>

    <script>
        // 1. The Database
        const boilerplates = [
          {
            name: "ShipFast",
            price: 199,
            description: "The Next.js boilerplate with all you need to build your SaaS, AI tool, or any other web app and make your first $ online fast.",
            tags: ["Next.js", "Stripe", "MongoDB", "Mailgun"],
            affiliateUrl: "https://shipfa.st/?via=YOUR_AFFILIATE_ID"
          },
          {
            name: "Supastarter",
            price: 249,
            description: "A production-ready SaaS boilerplate for Next.js and Nuxt. Features authentication, billing, multi-tenancy and more.",
            tags: ["Next.js", "Nuxt", "Supabase", "i18n"],
            affiliateUrl: "https://supastarter.dev/?ref=YOUR_AFFILIATE_ID"
          }
        ];

        const grid = document.getElementById('directory-grid');
        const noResults = document.getElementById('no-results');
        
        // 2. Function to draw the cards
        function renderGrid(data) {
            grid.innerHTML = ''; // Clear current grid
            
            if(data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            data.forEach((bp, index) => {
                const tagsHtml = bp.tags.map(tag => 
                    `<span class="bg-blue-50 text-blue-700 border border-blue-100 text-xs px-3 py-1.5 rounded-full font-medium">${tag}</span>`
                ).join('');
                
                // Added hover:-translate-y-2 and hover:shadow-xl for depth!
                const card = `
                <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 animate-fade-in flex flex-col h-full" style="animation-delay: ${index * 0.1}s">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">${bp.name}</h2>
                        <span class="bg-green-100 text-green-800 text-sm font-bold px-3 py-1 rounded-full">$${bp.price}</span>
                    </div>
                    
                    <p class="text-gray-600 mb-8 flex-grow leading-relaxed">${bp.description}</p>
                    
                    <div class="flex flex-wrap gap-2 mb-8">
                        ${tagsHtml}
                    </div>
                    
                    <a href="${bp.affiliateUrl}" target="_blank" class="block w-full text-center bg-gray-900 text-white font-bold py-4 rounded-xl hover:bg-blue-600 hover:shadow-lg transform transition-all duration-200">
                        Get ${bp.name}
                    </a>
                </div>`;
                
                grid.innerHTML += card;
            });
        }

        // 3. Start the page by showing all items
        renderGrid(boilerplates);

        // 4. Make the Search Bar Live
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = boilerplates.filter(bp => {
                return bp.name.toLowerCase().includes(searchTerm) || 
                       bp.description.toLowerCase().includes(searchTerm) ||
                       bp.tags.some(tag => tag.toLowerCase().includes(searchTerm));
            });
            renderGrid(filteredData);
        });
    </script>
</body>
</html>
