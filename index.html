        :root { --primary: #22d3ee; --primary-glow: rgba(34,211,238,0.5); --bg-color: #050507; --card-bg: #111827; }
        body.matrix-theme { --primary: #22c55e; --primary-glow: rgba(34,197,94,0.5); --bg-color: #000000; --card-bg: #052e16; }

            { id: "66", name: "Amplify SaaS", price: 0, upvotes: 105, description: "AWS-backed template handling Cognito auth, AppSync GraphQL, and DynamoDB.", tags: ["AWS", "React", "Serverless"], timeSaved: "40 hours", url: "https://aws.amazon.com/amplify/" },
            { id: "67", name: "Vuexy", price: 35, upvotes: 310, description: "The best-selling Vue.js admin template packed with enterprise-ready app views.", tags: ["Vue", "Admin"], timeSaved: "50 hours", url: "https://themeforest.net/item/vuexy-vuejs-html-laravel-admin-dashboard-template/23328599" },
            { id: "68", name: "TailAdmin", price: 0, upvotes: 180, description: "Free and open-source Tailwind CSS admin dashboard template for SaaS analytics.", tags: ["Tailwind", "Alpine.js", "Open Source"], timeSaved: "15 hours", url: "https://tailadmin.com/" },
            { id: "69", name: "SvelteKit Auth", price: 0, upvotes: 55, description: "Minimalist SvelteKit starting point heavily optimized for secure session management.", tags: ["SvelteKit", "Auth"], timeSaved: "10 hours", url: "https://kit.svelte.dev/" },
            { id: "70", name: "Rust Actix Web", price: 0, upvotes: 82, description: "Ultra-high performance Rust backend template paired with a Yew frontend.", tags: ["Rust", "WebAssembly", "Open Source"], timeSaved: "35 hours", url: "https://actix.rs/" }
        ];

                let activeFilter = 'all';
        let searchQuery = '';
        let currentSort = 'default';
        let currentBudget = 500;
        let compareList = [];
        let showingSavedOnly = false;
        
        let userUpvotes = [];
        let userSaved = [];
        try { 
            userUpvotes = JSON.parse(localStorage.getItem('hub_upvotes')) || []; 
            userSaved = JSON.parse(localStorage.getItem('hub_saved')) || []; 
        } catch(e) { }

        const grid = document.getElementById('directory-grid');
        const noResults = document.getElementById('no-results');
        const modal = document.getElementById('universalModal');
        const modalContent = document.getElementById('modalContent');

        function toggleTheme() { document.body.classList.toggle('matrix-theme'); }

        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && e.target.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('searchInput').focus(); }
            if (e.key === 'Escape') closeModal();
        });

        function getLogo(tags) {
            const str = tags.join(' ').toLowerCase();
            if(str.includes('next.js')) return '▲';
            if(str.includes('react')) return '⚛️';
            if(str.includes('laravel')) return '🌶️';
            if(str.includes('python') || str.includes('django')) return '🐍';
            if(str.includes('node')) return '🟩';
            return '⚡';
        }

        function renderGrid() {
            document.getElementById('savedCount').innerText = userSaved.length;
            
            let data = boilerplates.filter(item => {
                const matchesFilter = activeFilter === 'all' || item.tags.includes(activeFilter);
                const matchesSearch = item.name.toLowerCase().includes(searchQuery) || item.description.toLowerCase().includes(searchQuery);
                const matchesBudget = item.price <= currentBudget;
                const matchesSaved = showingSavedOnly ? userSaved.includes(item.id) : true;
                return matchesFilter && matchesSearch && matchesBudget && matchesSaved;
            });

            if (currentSort === 'price-low') data.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') data.sort((a, b) => b.price - a.price);

            grid.innerHTML = '';
            if (data.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');

            data.forEach((bp) => {
                const isUpvoted = userUpvotes.includes(bp.id);
                const isSaved = userSaved.includes(bp.id);
                const tagsHtml = bp.tags.map(tag => `<span class="bg-gray-950 text-gray-400 border border-gray-800 text-[9px] font-mono px-2 py-1 rounded">${tag.toUpperCase()}</span>`).join('');
                const logo = getLogo(bp.tags);
                
                let badgeHtml = '';
                if(bp.id === "1") badgeHtml = `<span class="absolute -top-3 -right-3 bg-pink-600 text-white text-[10px] font-black px-3 py-1 rounded-full animate-pulse z-10">-20% OFF</span>`;
                else if(bp.price === 0) badgeHtml = `<span class="absolute -top-3 -right-3 bg-emerald-500 text-black text-[10px] font-black px-3 py-1 rounded-full z-10">FREE</span>`;

                grid.innerHTML += `
                <div class="bg-gray-900 border border-gray-800 p-5 rounded-xl hover:border-gray-600 transition-all duration-300 animate-fade-in flex flex-col h-full relative group shadow-lg" style="background-color: var(--card-bg);">
                    ${badgeHtml}
                    <button onclick="toggleBookmark('${bp.id}', event)" class="absolute top-4 right-4 text-xl ${isSaved ? 'text-yellow-400' : 'text-gray-600 hover:text-yellow-400'} transition-colors z-20">★</button>
                    <div class="flex items-start mb-3 pr-6">
                        <div class="text-2xl mr-3 opacity-80">${logo}</div>
                        <div>
                            <h2 class="text-lg font-bold text-white tracking-tight group-hover:theme-text transition-colors">${bp.name}</h2>
                            <p class="text-[10px] font-mono text-gray-500 mt-0.5">Saves ${bp.timeSaved}</p>
                        </div>
                    </div>
                    <div class="text-xl font-bold theme-text font-mono mb-2">$${bp.price}</div>
                    <p class="text-gray-400 text-xs leading-relaxed mb-4 flex-grow">${bp.description}</p>
                    <div class="flex flex-wrap gap-1.5 mb-5">${tagsHtml}</div>
                    <div class="grid grid-cols-4 gap-2 mt-auto">
                        <button onclick="handleUpvote('${bp.id}', event)" class="col-span-1 border ${isUpvoted ? 'theme-border theme-text bg-gray-800' : 'border-gray-800 text-gray-400 hover:border-gray-600'} rounded-lg p-1.5 flex flex-col items-center transition-all text-[10px] font-mono">
                            <span>▲</span><span>${bp.upvotes + (isUpvoted?1:0)}</span>
                        </button>
                        <button onclick="openQuickView('${bp.id}')" class="col-span-1 border border-gray-800 hover:border-gray-600 text-gray-300 rounded-lg text-sm">👁</button>
                        <a href="${bp.url}" target="_blank" class="col-span-2 text-center theme-bg text-black font-bold rounded-lg flex items-center justify-center text-[11px] tracking-wider font-mono">GET ➔</a>
                        <label class="col-span-4 flex items-center justify-center gap-2 text-[10px] font-mono text-gray-500 border border-gray-800 py-1.5 rounded hover:bg-gray-800 cursor-pointer transition-all mt-1">
                            <input type="checkbox" onchange="toggleCompare('${bp.id}')" ${compareList.includes(bp.id) ? 'checked' : ''} class="cursor-pointer"> Compare
                        </label>
                    </div>
                </div>`;
            });
        }

                function injectDealOfDay() {
            if(boilerplates.length === 0) return;
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const deal = boilerplates[dayOfYear % boilerplates.length];
            document.getElementById('dealOfTheDay').innerHTML = `
                <div class="border theme-border theme-shadow rounded-xl p-1 bg-gray-900 mb-8 animate-fade-in relative overflow-hidden text-center flex flex-col md:flex-row items-center justify-between gap-4 py-4 px-6">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full hover:animate-[shimmer_2s_infinite]"></div>
                    <div class="flex items-center gap-3">
                        <span class="bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest animate-pulse">Flash Deal</span>
                        <span class="text-white text-sm font-bold">${deal.name} is trending today!</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-gray-400 font-mono text-xs">Ends in: <span class="theme-text font-bold">14h 22m</span></span>
                        <button onclick="openQuickView('${deal.id}')" class="border theme-border theme-text px-4 py-1.5 rounded text-xs font-bold hover:theme-bg hover:text-black transition-all">View Details</button>
                    </div>
                </div>`;
        }

        window.toggleBookmark = function(id, event) {
            event.stopPropagation();
            if(userSaved.includes(id)) userSaved = userSaved.filter(i => i !== id); else userSaved.push(id);
            localStorage.setItem('hub_saved', JSON.stringify(userSaved));
            renderGrid();
        };

        window.toggleSaved = function() {
            showingSavedOnly = !showingSavedOnly;
            const btn = document.getElementById('showSavedBtn');
            if(showingSavedOnly) { btn.classList.add('theme-bg', 'text-black'); btn.classList.remove('bg-gray-900', 'text-gray-300'); } 
            else { btn.classList.remove('theme-bg', 'text-black'); btn.classList.add('bg-gray-900', 'text-gray-300'); }
            renderGrid();
        };

        window.randomTool = function() {
            if(boilerplates.length === 0) return;
            openQuickView(boilerplates[Math.floor(Math.random() * boilerplates.length)].id);
        };

        window.openMatchmaker = function() {
            modalContent.innerHTML = `
                <div class="text-center py-4">
                    <div class="text-4xl mb-4">🤖</div>
                    <h3 class="text-2xl font-black text-white mb-2">Find Your Perfect Stack</h3>
                    <p class="text-gray-400 text-sm mb-6">Answer 2 questions. We'll crunch the data.</p>
                    <div class="text-left space-y-4 mb-8">
                        <div>
                            <label class="block text-xs font-mono theme-text mb-2">1. PREFERRED LANGUAGE?</label>
                            <select id="quizLang" class="w-full bg-gray-900 border border-gray-700 text-white rounded p-3 text-sm focus:outline-none theme-border">
                                <option value="Next.js">React / Next.js</option><option value="Laravel">PHP / Laravel</option>
                                <option value="Django">Python / Django</option><option value="Node.js">Node / Express</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-mono theme-text mb-2">2. MAXIMUM BUDGET?</label>
                            <select id="quizBudget" class="w-full bg-gray-900 border border-gray-700 text-white rounded p-3 text-sm focus:outline-none theme-border">
                                <option value="0">$0 (Free Only)</option><option value="150">Under $150</option>
                                <option value="300">Under $300</option><option value="1000">Money is no object</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="runMatchmaker()" class="w-full theme-bg text-black font-black py-4 rounded-xl text-sm tracking-widest uppercase hover:scale-105 transition-all">Calculate Match</button>
                </div>`;
            modal.classList.remove('hidden');
        };

        window.runMatchmaker = function() {
            const lang = document.getElementById('quizLang').value;
            const budget = parseInt(document.getElementById('quizBudget').value);
            const matches = boilerplates.filter(bp => bp.tags.includes(lang) && bp.price <= budget);
            if(matches.length === 0) {
                modalContent.innerHTML = `<div class="text-center py-10"><div class="text-4xl mb-4">❌</div><h3 class="text-xl text-white font-bold">No exact match found!</h3><button onclick="closeModal()" class="mt-6 border border-gray-600 text-white px-4 py-2 rounded">Close</button></div>`;
            } else {
                openQuickView(matches.sort((a,b) => b.upvotes - a.upvotes)[0].id);
            }
        };

        window.toggleCompare = function(id) {
            const cb = document.getElementById('compareBar');
            if(compareList.includes(id)) compareList = compareList.filter(item => item !== id);
            else { if(compareList.length >= 2) { alert("Max 2 tools. Clear first."); renderGrid(); return; } compareList.push(id); }
            if(compareList.length > 0) { cb.classList.remove('hidden'); cb.classList.add('flex'); document.getElementById('compareCount').innerText = compareList.length; } 
            else { cb.classList.add('hidden'); cb.classList.remove('flex'); }
        };
        window.clearCompare = function() { compareList = []; document.getElementById('compareBar').classList.add('hidden'); document.getElementById('compareBar').classList.remove('flex'); renderGrid(); };

        window.openCompare = function() {
            if(compareList.length !== 2) return;
            const i1 = boilerplates.find(b => b.id === compareList[0]);
            const i2 = boilerplates.find(b => b.id === compareList[1]);
            modalContent.innerHTML = `
                <div class="border-b border-gray-800 pb-3 mb-4 flex justify-between items-center">
                    <span class="text-xs font-mono theme-text tracking-widest uppercase">Head-to-Head</span>
                    <button onclick="clearCompare(); closeModal()" class="text-[10px] text-gray-500 hover:text-white border border-gray-800 px-2 py-1 rounded">CLEAR</button>
                </div>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    ${[i1, i2].map(item => `
                        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex flex-col">
                            <h3 class="font-bold text-white mb-1 text-lg">${item.name}</h3>
                            <div class="theme-text font-mono text-sm mb-3">$${item.price}</div>
                            <p class="text-gray-400 text-xs mb-4 flex-grow">${item.description}</p>
                            <a href="${item.url}" target="_blank" class="w-full text-center border theme-border theme-text hover:theme-bg hover:text-black py-2 rounded-lg text-xs font-bold transition-all">GET IT</a>
                        </div>
                    `).join('')}
                </div>`;
            modal.classList.remove('hidden');
        };

        window.openQuickView = function(id) {
            const bp = boilerplates.find(item => item.id === id);
            if (!bp) return;
            const similar = boilerplates.filter(item => item.id !== bp.id && item.tags.some(t => bp.tags.includes(t))).slice(0, 2);
            let similarHtml = '';
            if(similar.length > 0) {
                similarHtml = `
                    <div class="mt-5 pt-4 border-t border-gray-800">
                        <p class="text-[10px] font-mono text-gray-500 mb-2 uppercase tracking-widest">Alternatives</p>
                        <div class="grid grid-cols-2 gap-2">
                            ${similar.map(s => `
                                <div onclick="openQuickView('${s.id}')" class="bg-gray-900 cursor-pointer p-3 rounded-lg border border-gray-800 text-center hover:border-gray-500 transition-all">
                                    <div class="text-xs font-bold text-gray-300 truncate">${s.name}</div>
                                    <div class="text-[10px] theme-text font-mono mt-1">${s.price === 0 ? 'FREE' : '$' + s.price}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
            modalContent.innerHTML = `
                <div class="border-b border-gray-800 pb-4 mb-4">
                    <span class="text-xs font-mono theme-text tracking-widest uppercase">Blueprint Overview</span>
                    <h3 class="text-2xl font-black text-white mt-1 flex items-center gap-2">${getLogo(bp.tags)} ${bp.name}</h3>
                </div>
                <div class="space-y-4 text-sm">
                    <p class="text-gray-300 leading-relaxed text-xs">${bp.description}</p>
                    <div class="grid grid-cols-2 gap-4 bg-gray-900 p-3 rounded-xl border border-gray-800 font-mono text-xs text-gray-400">
                        <div>💸 Price: <span class="text-white font-bold">$${bp.price}</span></div>
                        <div>⚡ Saved: <span class="text-white font-bold">${bp.timeSaved}</span></div>
                    </div>
                    <div class="pt-1 flex gap-2">
                        <a href="${bp.url}" target="_blank" class="flex-grow text-center theme-bg text-black font-extrabold py-3 rounded-xl text-xs tracking-widest font-mono transition-all">ACQUIRE ACCESS</a>
                        <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('Found the perfect template on SAAS.HUB 🚀')}" target="_blank" class="flex items-center justify-center bg-gray-900 text-white border border-gray-800 w-12 rounded-xl hover:bg-[#1DA1F2] hover:border-[#1DA1F2]" title="Share">𝕏</a>
                    </div>
                    ${similarHtml}
                </div>`;
            modal.classList.remove('hidden');
        };

        window.handleUpvote = function(id, event) {
            event.stopPropagation();
            if (userUpvotes.includes(id)) userUpvotes = userUpvotes.filter(i => i !== id); else userUpvotes.push(id);
            localStorage.setItem('hub_upvotes', JSON.stringify(userUpvotes));
            renderGrid();
        };

        window.closeModal = function() { modal.classList.add('hidden'); };
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

        document.getElementById('budgetRange').addEventListener('input', (e) => { currentBudget = parseInt(e.target.value); document.getElementById('budgetValue').innerText = currentBudget; renderGrid(); });
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderGrid(); });
        document.getElementById('sortSelect').addEventListener('change', (e) => { currentSort = e.target.value; renderGrid(); });
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-gray-800', 'text-white');
                btn.classList.add('bg-gray-900', 'text-gray-400');
            });
            e.target.classList.remove('bg-gray-900', 'text-gray-400');
            e.target.classList.add('active', 'bg-gray-800', 'text-white');
            activeFilter = e.target.getAttribute('data-filter');
            renderGrid();
        });

        setTimeout(() => { injectDealOfDay(); renderGrid(); }, 100);
    </script>
</body>
</html>
