<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Hub - Premium Boilerplates Directory</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        body { background-color: #050507; color: #f3f4f6; }
        
        /* Grid background effect */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body class="font-sans min-h-screen bg-grid selection:bg-cyan-500 selection:text-black">

    <!-- Top Navigation Bar -->
    <nav class="border-b border-gray-900 bg-black/60 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                SAAS.HUB
            </div>
            <div class="flex items-center gap-4">
                <select id="sortSelect" class="bg-gray-900 border border-gray-800 text-gray-300 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-cyan-500">
                    <option value="default">Sort: Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="popular">Most Popular (Upvotes)</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Glowing Cyberpunk Header -->
    <header class="relative py-20 px-6 text-center border-b border-gray-900 bg-black/40">
        <div class="absolute top-10 left-1/2 -translate-x-1/2 w-[500px] h-[250px] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 right-1/4 w-[300px] h-[150px] bg-cyan-600/10 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tight text-white">
                Launch Your SaaS <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">At Lightspeed</span>
            </h1>
            <p class="text-base md:text-lg text-gray-400 mb-8 max-w-xl mx-auto">
                Skip weeks of setup. Compare and find the ultimate codebase template for your startup.
            </p>
            
            <!-- Live Search Bar -->
            <div class="relative max-w-lg mx-auto mb-6">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search frameworks, features, or names..." 
                    class="w-full px-5 py-3.5 rounded-xl bg-gray-950 border border-gray-800 text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400 transition-all shadow-2xl text-sm"
                >
            </div>

            <!-- Quick Filter Tags -->
            <div class="flex flex-wrap justify-center gap-2 max-w-2xl mx-auto" id="filterContainer">
                <button class="filter-btn active bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-xs px-3 py-1.5 rounded-full font-mono transition-all" data-filter="all">ALL</button>
                <button class="filter-btn bg-gray-900 border border-gray-800 text-gray-400 text-xs px-3 py-1.5 rounded-full font-mono transition-all hover:border-gray-700" data-filter="Next.js">NEXT.JS</button>
                <button class="filter-btn bg-gray-900 border border-gray-800 text-gray-400 text-xs px-3 py-1.5 rounded-full font-mono transition-all hover:border-gray-700" data-filter="Laravel">LARAVEL</button>
                <button class="filter-btn bg-gray-900 border border-gray-800 text-gray-400 text-xs px-3 py-1.5 rounded-full font-mono transition-all hover:border-gray-700" data-filter="Stripe">STRIPE</button>
                <button class="filter-btn bg-gray-900 border border-gray-800 text-gray-400 text-xs px-3 py-1.5 rounded-full font-mono transition-all hover:border-gray-700" data-filter="AI">AI-READY</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="directory-grid">
            <!-- Dynamic Cards Injected Here -->
        </div>
        
        <!-- Empty State -->
        <div id="no-results" class="hidden text-center py-20">
            <p class="text-xl text-purple-400 font-bold">System Offline</p>
            <p class="text-gray-500 text-sm mt-1">No tools matching your query were found.</p>
        </div>
    </main>

    <!-- Immersive Quick View Modal Overlay -->
    <div id="quickViewModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-950 border border-gray-800 w-full max-w-lg rounded-2xl overflow-hidden p-6 relative animate-fade-in shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white font-mono text-xl">&times;</button>
            <div id="modalContent">
                <!-- Injected via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Application Database and Logic -->
    <script>
    
        // To easily expand this to 50 items, look at the loop block below which generates variations dynamically!
                // Core data structure containing 10 real baseline setups with ACTUAL URLs.
        const baseBoilerplates = [
            { id: "1", name: "ShipFast", price: 199, upvotes: 142, description: "The premier Next.js template packaged with user auth, database mapping, Stripe gateways, and cold email workflows.", tags: ["Next.js", "Stripe", "MongoDB", "AI"], timeSaved: "40+ hours", url: "https://shipfa.st/?via=YOUR_AFFILIATE_ID" },
            { id: "2", name: "Supastarter", price: 249, upvotes: 98, description: "A high-performance SaaS foundation supporting Next.js architectures. Includes robust multi-tenancy configurations out of the box.", tags: ["Next.js", "Supabase", "Stripe"], timeSaved: "35 hours", url: "https://supastarter.dev/?ref=YOUR_AFFILIATE_ID" },
            { id: "3", name: "SaaS Pegasus", price: 295, upvotes: 114, description: "The standard for production Python deployments. Thoroughly optimized Django components ready for distribution configurations.", tags: ["Django", "Python", "PostgreSQL"], timeSaved: "50+ hours", url: "https://www.saaspegasus.com/" },
            { id: "4", name: "Makerkit", price: 249, upvotes: 76, description: "An enterprise-grade template tailored for Firebase integrations alongside prebuilt subscription flows.", tags: ["Next.js", "Firebase", "Stripe"], timeSaved: "30 hours", url: "https://makerkit.dev/" },
            { id: "5", name: "Larafast", price: 149, upvotes: 89, description: "Accelerated application development workspace utilizing native Laravel tools alongside Vue view layers.", tags: ["Laravel", "Vue", "Stripe", "AI"], timeSaved: "25 hours", url: "https://larafast.com/" },
            { id: "6", name: "Bullet Train", price: 449, upvotes: 53, description: "A premium Ruby on Rails framework optimization providing comprehensive business-in-a-box assets.", tags: ["Ruby on Rails", "PostgreSQL"], timeSaved: "60 hours", url: "https://bullettrain.co/" },
            { id: "7", name: "Divjoy", price: 169, upvotes: 67, description: "Visual workspace application generator that outputs cleanly structured component structures based on your selected platform configuration.", tags: ["React", "Firebase"], timeSaved: "20 hours", url: "https://divjoy.com/" },
            { id: "8", name: "Gravity", price: 349, upvotes: 82, description: "Comprehensive architectural framework covering complex configurations inside standard Node environments.", tags: ["Node.js", "React", "PostgreSQL"], timeSaved: "45 hours", url: "https://usegravity.app/" },
            { id: "9", name: "Jumpstart", price: 249, upvotes: 61, description: "Sleek and modular structural patterns helping you map custom payment workflows instantly inside Rails projects.", tags: ["Ruby on Rails", "Stripe"], timeSaved: "35 hours", url: "https://jumpstartrails.com/" },
            { id: "10", name: "Nextless", price: 199, upvotes: 45, description: "Serverless backend systems cleanly integrated inside a structured Next.js configuration.", tags: ["Next.js", "AWS", "Serverless"], timeSaved: "40 hours", url: "https://nextlessjs.com/" }
        ];
        
        

        // AUTO-GENERATION ENGINE: Fills the array cleanly to reach a massive directory list
        const boilerplates = [...baseBoilerplates];
        const frameworks = ["Next.js", "Laravel", "Django", "React", "Node.js"];
        const secondaryTags = ["Stripe", "Supabase", "MongoDB", "PostgreSQL", "AI", "AWS"];
        
        for (let i = 11; i <= 50; i++) {
            const f = frameworks[i % frameworks.length];
            const s = secondaryTags[i % secondaryTags.length];
            const aiTag = i % 3 === 0 ? ["AI"] : [];
            
            boilerplates.push({
                id: i.toString(),
                name: `${f} Starter Suite v${i}`,
                price: Math.floor((Math.random() * 250) + 79),
                upvotes: Math.floor(Math.random() * 40) + 5,
                description: `A highly scalable, production-tested boilerplate environment optimizing components for ${f} infrastructures with built-in ${s} support.`,
                tags: [f, s, ...aiTag],
                timeSaved: `${Math.floor(Math.random() * 30) + 15} hours`,
                url: "https://google.com/search?q=" + encodeURIComponent(f + " boilerplate")
            });
        }

        // State Tracking variables
        let activeFilter = 'all';
        let searchQuery = '';
        let currentSort = 'default';

        // Initialize Upvote Records from localStorage to persist user interactions
        let userUpvotes = JSON.parse(localStorage.getItem('hub_upvotes')) || [];

        const grid = document.getElementById('directory-grid');
        const noResults = document.getElementById('no-results');

        // Render Loop for Card Components
        function renderGrid() {
            // Apply Filters first
            let data = boilerplates.filter(item => {
                const matchesFilter = activeFilter === 'all' || item.tags.includes(activeFilter);
                const matchesSearch = item.name.toLowerCase().includes(searchQuery) || 
                                      item.description.toLowerCase().includes(searchQuery) ||
                                      item.tags.some(t => t.toLowerCase().includes(searchQuery));
                return matchesFilter && matchesSearch;
            });

            // Apply Sorting
            if (currentSort === 'price-low') data.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') data.sort((a, b) => b.price - a.price);
            else if (currentSort === 'popular') data.sort((a, b) => (b.upvotes + (userUpvotes.includes(b.id) ? 1 : 0)) - (a.upvotes + (userUpvotes.includes(a.id) ? 1 : 0)));

            grid.innerHTML = '';
            if (data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            data.forEach((bp) => {
                const isUpvoted = userUpvotes.includes(bp.id);
                const displayUpvotes = bp.upvotes + (isUpvoted ? 1 : 0);
                
                const tagsHtml = bp.tags.map(tag => 
                    `<span class="bg-gray-950 text-gray-400 border border-gray-800 text-[10px] font-mono px-2 py-1 rounded">${tag.toUpperCase()}</span>`
                ).join('');

                const card = `
                <div class="bg-gradient-to-b from-gray-900 to-black rounded-xl border border-gray-800 p-5 hover:border-cyan-500/50 hover:shadow-[0_0_25px_rgba(34,211,238,0.05)] transition-all duration-300 animate-fade-in flex flex-col h-full relative group">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h2 class="text-xl font-bold text-white tracking-tight group-hover:text-cyan-400 transition-colors">${bp.name}</h2>
                            <p class="text-xs font-mono text-purple-400 mt-0.5">⏱ Saves ${bp.timeSaved}</p>
                        </div>
                        <span class="bg-cyan-950/40 text-cyan-400 border border-cyan-800/30 text-xs font-bold px-2.5 py-1 rounded-md">$${bp.price}</span>
                    </div>
                    
                    <p class="text-gray-400 text-xs leading-relaxed mb-4 flex-grow">${bp.description}</p>
                    
                    <div class="flex flex-wrap gap-1.5 mb-5">
                        ${tagsHtml}
                    </div>
                    
                    <!-- Action Row Layout -->
                    <div class="grid grid-cols-4 gap-2 mt-auto">
                        <button onclick="handleUpvote('${bp.id}', event)" class="col-span-1 border ${isUpvoted ? 'border-pink-500 text-pink-500 bg-pink-500/5' : 'border-gray-800 text-gray-400 hover:border-gray-700'} rounded-lg p-2 flex flex-col items-center justify-center transition-all text-xs font-mono">
                            <span>▲</span>
                            <span>${displayUpvotes}</span>
                        </button>
                        <button onclick="openQuickView('${bp.id}')" class="col-span-1 border border-gray-800 hover:border-gray-700 text-gray-300 rounded-lg flex items-center justify-center transition-all text-sm">
                            👁
                        </button>
                        <a href="${bp.url}" target="_blank" class="col-span-2 text-center bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-lg flex items-center justify-center text-xs tracking-wider font-mono transition-all">
                            GET ➔
                        </a>
                    </div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        // Live Event Handlers
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderGrid();
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderGrid();
        });

        // Pill button selection logic
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-cyan-500/10', 'border-cyan-500/30', 'text-cyan-400');
                btn.classList.add('bg-gray-900', 'border-gray-800', 'text-gray-400');
            });
            e.target.classList.remove('bg-gray-900', 'border-gray-800', 'text-gray-400');
            e.target.classList.add('active', 'bg-cyan-500/10', 'border-cyan-500/30', 'text-cyan-400');
            activeFilter = e.target.getAttribute('data-filter');
            renderGrid();
        });

        // Upvote Persistent state calculation logic
        window.handleUpvote = function(id, event) {
            event.stopPropagation();
            const index = userUpvotes.indexOf(id);
            if (index === -1) userUpvotes.push(id);
            else userUpvotes.splice(index, 1);
            localStorage.setItem('hub_upvotes', JSON.stringify(userUpvotes));
            renderGrid();
        };

        // Quick View Feature Core Execution
        const modal = document.getElementById('quickViewModal');
        const modalContent = document.getElementById('modalContent');

        window.openQuickView = function(id) {
            const bp = boilerplates.find(item => item.id === id);
            if (!bp) return;

            modalContent.innerHTML = `
                <div class="border-b border-gray-900 pb-4 mb-4">
                    <span class="text-xs font-mono text-cyan-400 tracking-widest uppercase">Product Blueprint Overview</span>
                    <h3 class="text-2xl font-black text-white mt-1">${bp.name}</h3>
                </div>
                <div class="space-y-4 text-sm">
                    <div>
                        <p class="text-gray-500 font-mono text-xs">ARCHITECTURAL SCOPE</p>
                        <p class="text-gray-300 mt-1 leading-relaxed">${bp.description} This template standardizes asset pipelines, provides pre-tested authentication routing, and packages critical middleware components required to securely deliver core code directly into functional testing pipelines.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 bg-gray-900/40 p-3 rounded-xl border border-gray-900 font-mono text-xs text-gray-400">
                        <div>💸 Entry Price: <span class="text-white font-bold">$${bp.price}</span></div>
                        <div>⚡ Development Saved: <span class="text-emerald-400 font-bold">${bp.timeSaved}</span></div>
                    </div>
                    <div class="pt-2">
                        <a href="${bp.url}" target="_blank" class="block w-full text-center bg-cyan-500 hover:bg-cyan-400 text-black font-extrabold py-3 rounded-xl text-xs tracking-widest font-mono transition-all">
                            ACQUIRE LIFETIME ACCESS LICENSE
                        </a>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        document.getElementById('closeModal').addEventListener('click', () => modal.classList.add('hidden'));
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.add('hidden'); });

        // Initial Layout paint execution
        renderGrid();
    </script>
</body>
</html>
